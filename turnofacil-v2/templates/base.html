<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TurnoFácil{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">

    <div class="container">

        <a class="navbar-brand fw-bold" href="/">
            TurnoFácil
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <div class="navbar-nav me-auto">

                <a class="nav-link" href="/">
                    Inicio
                </a>

                <a class="nav-link" href="/turnos/">
                    Turnos
                </a>

                <a class="nav-link" href="/turnos/profesionales/">
                    Profesionales
                </a>

            </div>

            <div class="navbar-nav">

                {% if user.is_authenticated %}

                    <span class="nav-link">
                        Hola, {{ user.username }}
                    </span>

                    <a class="nav-link" href="/accounts/logout/">
                        Salir
                    </a>

                {% else %}

                    <a class="nav-link" href="/accounts/login/">
                        Ingresar
                    </a>

                    <a class="nav-link" href="/accounts/registro/">
                        Registro
                    </a>

                {% endif %}

            </div>

        </div>

    </div>

</nav>

<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

<footer class="bg-light text-center mt-5 p-3 border-top">

    <p class="mb-0">
        TurnoFácil - Trabajo Práctico Django
    </p>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
