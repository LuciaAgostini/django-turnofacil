{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-7">

        <div class="card shadow">

            <div class="card-header bg-success text-white">
                <h3 class="mb-0">Registro de Usuario</h3>
            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-success">
                        Registrarse
                    </button>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}
