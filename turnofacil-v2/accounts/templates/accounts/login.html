{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Iniciar sesión</h3>
            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-primary">
                        Ingresar
                    </button>

                </form>

            </div>

        </div>

    </div>
</div>

{% endblock %}
