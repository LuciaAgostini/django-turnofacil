{% extends 'base.html' %}

{% block title %}Turno{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow">

            <div class="card-header">
                Crear / Editar Turno
            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button type="submit" class="btn btn-success">
                        Guardar
                    </button>

                    <a href="{% url 'lista_turnos' %}" class="btn btn-secondary">
                        Volver
                    </a>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
