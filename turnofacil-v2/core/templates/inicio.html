{% extends 'base.html' %}

{% block title %}Inicio{% endblock %}

{% block content %}

<div class="p-5 mb-4 bg-light rounded-3 shadow">

    <div class="container-fluid py-5">

        <h1 class="display-4 fw-bold">
            Bienvenido a TurnoFácil
        </h1>

        <p class="lead">
            Sistema de gestión de turnos desarrollado con Django.
        </p>

        {% if user.is_authenticated %}

            <a href="/turnos/" class="btn btn-primary btn-lg me-2">
                Ver Turnos
            </a>

            <a href="/admin/" class="btn btn-warning btn-lg">
                Administración
            </a>

        {% else %}

            <a href="/accounts/login/" class="btn btn-primary btn-lg me-2">
                Iniciar sesión
            </a>

            <a href="/accounts/registro/" class="btn btn-success btn-lg">
                Registrarme
            </a>

        {% endif %}

    </div>

</div>

{% endblock %}
